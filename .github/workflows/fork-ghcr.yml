# Fork-only build: pushes test images to ghcr.io/mebezac/trek.
# Fires when a PR is open and on every push to that PR's branch (synchronize),
# plus manual dispatch. No-op on upstream thanks to the repository guard, so it
# is harmless if this file ever leaks into an upstream PR.
name: Fork GHCR Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # one in-flight build per PR/branch; cancel superseded pushes
  group: fork-ghcr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'mebezac/TREK'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mebezac/trek
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}
